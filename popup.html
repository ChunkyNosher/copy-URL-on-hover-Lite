<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copy URL on Hover Lite</title>
    <link rel="stylesheet" href="vendor/vanilla-picker.csp.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="control-deck">
      <h1 class="sr-only">Copy URL on Hover settings</h1>

      <section
        class="settings-section shortcut-section"
        aria-labelledby="shortcuts-title"
      >
        <div class="section-heading">
          <div>
            <p class="section-kicker">Shortcuts</p>
            <h2 id="shortcuts-title">Keyboard controls</h2>
          </div>
          <p class="section-note">
            Select a key slot, then press the combination you want.
          </p>
        </div>
        <div class="shortcut-list" id="shortcuts"></div>
      </section>

      <section class="settings-section" aria-labelledby="copy-title">
        <div class="section-heading compact">
          <div>
            <p class="section-kicker">Copy behavior</p>
            <h2 id="copy-title">URL cleanup</h2>
          </div>
        </div>
        <label class="switch-row">
          <span
            ><strong>Remove tracking parameters</strong
            ><small>Keep useful query values such as a product ID.</small></span
          >
          <input id="cleanTrackingParameters" type="checkbox" />
          <span class="switch" aria-hidden="true"></span>
        </label>
      </section>

      <section class="settings-section" aria-labelledby="feedback-title">
        <div class="section-heading compact">
          <div>
            <p class="section-kicker">Feedback</p>
            <h2 id="feedback-title">Copy confirmation</h2>
          </div>
          <label class="inline-switch"
            ><input id="showNotification" type="checkbox" />
            <span id="notificationToggleLabel">On</span></label
          >
        </div>

        <div class="mode-picker" role="group" aria-label="Confirmation style">
          <label
            ><input
              type="radio"
              name="notificationDisplayMode"
              value="tooltip"
            />
            <span>At pointer</span></label
          >
          <label
            ><input type="radio" name="notificationDisplayMode" value="toast" />
            <span>Corner toast</span></label
          >
        </div>

        <div id="tooltipSettings" class="setting-card">
          <div class="card-label">Pointer tooltip</div>
          <div class="control-grid two">
            <div class="color-field">
              <span class="field-label">Color</span>
              <div
                id="tooltipColor"
                class="color-swatch"
                role="button"
                tabindex="0"
                aria-label="Choose tooltip color"
              >
                <span class="color-preview" aria-hidden="true"></span>
                <code></code>
                <span class="color-chevron" aria-hidden="true">⌄</span>
              </div>
            </div>
            <label
              >Duration
              <span class="unit-input"
                ><input
                  id="tooltipDuration"
                  type="number"
                  min="500"
                  max="10000"
                  step="100"
                /><b>ms</b></span
              ></label
            >
          </div>
          <label class="select-label"
            >Entrance
            <select id="tooltipAnimation">
              <option value="fade">Fade</option>
              <option value="slide">Slide</option>
              <option value="bounce">Bounce</option>
            </select>
          </label>
        </div>

        <div id="toastSettings" class="setting-card">
          <div class="card-label">Corner toast</div>
          <div class="control-grid two">
            <div class="color-field">
              <span class="field-label">Color</span>
              <div
                id="notifColor"
                class="color-swatch"
                role="button"
                tabindex="0"
                aria-label="Choose toast color"
              >
                <span class="color-preview" aria-hidden="true"></span>
                <code></code>
                <span class="color-chevron" aria-hidden="true">⌄</span>
              </div>
            </div>
            <label
              >Duration
              <span class="unit-input"
                ><input
                  id="notifDuration"
                  type="number"
                  min="500"
                  max="10000"
                  step="100"
                /><b>ms</b></span
              ></label
            >
            <label class="select-label"
              >Placement
              <select id="notifPosition">
                <option value="bottom-right">Bottom right</option>
                <option value="bottom-left">Bottom left</option>
                <option value="top-right">Top right</option>
                <option value="top-left">Top left</option>
              </select>
            </label>
            <label class="select-label"
              >Scale
              <select id="notifSize">
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
              </select>
            </label>
            <div class="color-field">
              <span class="field-label">Border</span>
              <div
                id="notifBorderColor"
                class="color-swatch"
                role="button"
                tabindex="0"
                aria-label="Choose toast border color"
              >
                <span class="color-preview" aria-hidden="true"></span>
                <code></code>
                <span class="color-chevron" aria-hidden="true">⌄</span>
              </div>
            </div>
            <label
              >Weight
              <span class="unit-input"
                ><input
                  id="notifBorderWidth"
                  type="number"
                  min="0"
                  max="8"
                  step="1"
                /><b>px</b></span
              ></label
            >
          </div>
          <label class="select-label"
            >Entrance
            <select id="notifAnimation">
              <option value="fade">Fade</option>
              <option value="slide">Slide</option>
              <option value="bounce">Bounce</option>
            </select>
          </label>
        </div>
      </section>

      <section class="settings-section" aria-labelledby="appearance-title">
        <div class="section-heading compact">
          <div>
            <p class="section-kicker">Workspace</p>
            <h2 id="appearance-title">Appearance</h2>
          </div>
        </div>
        <div class="appearance-row">
          <label class="switch-row compact-row">
            <span
              ><strong>Dark workspace</strong
              ><small>Use the deep-ink control deck.</small></span
            >
            <input id="darkMode" type="checkbox" />
            <span class="switch" aria-hidden="true"></span>
          </label>
          <label class="select-label density-control"
            >Density
            <select id="menuSize">
              <option value="compact">Compact</option>
              <option value="medium">Balanced</option>
              <option value="comfortable">Comfortable</option>
            </select>
          </label>
        </div>
      </section>

      <footer class="actions">
        <button id="reset" type="button" class="quiet-button">
          Restore defaults
        </button>
        <button id="save" type="button" class="save-button">
          Save settings <span>↗</span>
        </button>
      </footer>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="vendor/vanilla-picker.csp.min.js"></script>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
